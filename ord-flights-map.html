function greatCirclePoints(lat1, lon1, lat2, lon2, numPoints = 80) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const f1 = toRad(lat1), l1 = toRad(lon1);
  const f2 = toRad(lat2), l2 = toRad(lon2);
  const d = 2 * Math.asin(Math.sqrt(
    Math.pow(Math.sin((f1 - f2) / 2), 2) +
    Math.cos(f1) * Math.cos(f2) * Math.pow(Math.sin((l1 - l2) / 2), 2)
  ));
  if (d < 0.0001) return [[lat1, lon1], [lat2, lon2]];
  const points = [];
  for (let i = 0; i <= numPoints; i++) {
    const frac = i / numPoints;
    const A = Math.sin((1 - frac) * d) / Math.sin(d);
    const B = Math.sin(frac * d) / Math.sin(d);
    const x = A * Math.cos(f1) * Math.cos(l1) + B * Math.cos(f2) * Math.cos(l2);
    const y = A * Math.cos(f1) * Math.sin(l1) + B * Math.cos(f2) * Math.sin(l2);
    const z = A * Math.sin(f1) + B * Math.sin(f2);
    points.push([toDeg(Math.atan2(z, Math.sqrt(x * x + y * y))), toDeg(Math.atan2(y, x))]);
  }
  return points;
}

// Distance in km
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Initialize map
const map = L.map('map', {
  center: [30, -40],
  zoom: 3,
  minZoom: 2,
  maxZoom: 8,
  worldCopyJump: true,
  zoomControl: false
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ORD marker
const ordIcon = L.divIcon({
  html: `<div style="
    width:18px;height:18px;background:#ef4444;border:3px solid #fff;
    border-radius:50%;box-shadow:0 0 16px rgba(239,68,68,0.7),0 0 40px rgba(239,68,68,0.3);
  "></div>`,
  className: '',
  iconSize: [18, 18],
  iconAnchor: [9, 9]
});
L.marker(ORD, { icon: ordIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindTooltip('Chicago O\'Hare (ORD)', { className: 'tooltip-custom', permanent: false });

// Draw routes and destination markers
const allLayers = [];
routes.forEach(r => {
  const color = regionColors[r.region];
  const dist = haversine(ORD[0], ORD[1], r.lat, r.lon);
  const pts = greatCirclePoints(ORD[0], ORD[1], r.lat, r.lon, dist > 5000 ? 100 : 50);

  // Split polyline segments that cross the antimeridian
  const segments = [[]];
  for (let i = 0; i < pts.length; i++) {
    segments[segments.length - 1].push(pts[i]);
    if (i < pts.length - 1 && Math.abs(pts[i][1] - pts[i+1][1]) > 180) {
      segments.push([]);
    }
  }

  const lines = segments.filter(s => s.length > 1).map(seg =>
    L.polyline(seg, {
      color, weight: 1.4, opacity: 0.45,
      smoothFactor: 1
    }).addTo(map)
  );

  const destIcon = L.divIcon({
    html: `<div style="width:6px;height:6px;background:${color};border-radius:50%;box-shadow:0 0 6px ${color};"></div>`,
    className: '',
    iconSize: [6, 6],
    iconAnchor: [3, 3]
  });
  const marker = L.marker([r.lat, r.lon], { icon: destIcon })
    .addTo(map)
    .bindTooltip(
      `<strong>${r.city}</strong> (${r.code})<br>${regionNames[r.region]}<br>${Math.round(dist).toLocaleString()} km / ${Math.round(dist * 0.621371).toLocaleString()} mi`,
      { className: 'tooltip-custom' }
    );

  allLayers.push({ route: r, lines, marker });
});

document.getElementById('route-count').innerHTML = `<strong>${routes.length}</strong> destinations shown`;

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  allLayers.forEach(({ route, lines, marker }) => {
    const match = !q || route.city.toLowerCase().includes(q) || route.code.toLowerCase().includes(q);
    const opacity = match ? 0.45 : 0.04;
    const weight = match ? (q ? 2.5 : 1.4) : 0.8;
    lines.forEach(l => l.setStyle({ opacity, weight }));
    marker.setOpacity(match ? 1 : 0.1);
  });
});
</script>
</body>
</html>
